<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dungeon Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0d0d;
  color: #ddd;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
}
h1 {
  font-size: 15px;
  color: #88aaff;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
#game { display: flex; gap: 10px; align-items: flex-start; }
canvas {
  border: 2px solid #444;
  cursor: crosshair;
  display: block;
}
#sidebar {
  width: 230px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.panel {
  background: #161624;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 8px 10px;
}
.panel-title {
  font-size: 10px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  border-bottom: 1px solid #2a2a2a;
  padding-bottom: 4px;
}
.spawn-btn {
  display: block;
  width: 100%;
  margin-bottom: 4px;
  padding: 6px 8px;
  background: #111;
  border: 1px solid #334;
  color: #99aabb;
  cursor: pointer;
  border-radius: 3px;
  font-size: 11px;
  text-align: left;
  font-family: 'Courier New', monospace;
}
.spawn-btn:hover { background: #1a2a40; border-color: #4488ff; }
.spawn-btn.active { background: #0a2040; border-color: #4488ff; color: #aaddff; }
.faction-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  margin-bottom: 5px;
}
.dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  flex-shrink: 0;
}
#time-display {
  text-align: center;
  font-size: 15px;
  color: #aac;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}
#time-display:hover { color: #eef; }
#log-area {
  font-size: 10px;
  color: #666;
  max-height: 140px;
  overflow-y: auto;
  line-height: 1.6;
}
#log-area p { border-bottom: 1px solid #1a1a1a; padding-bottom: 2px; margin-bottom: 2px; }
.hint { font-size: 10px; color: #555; margin-bottom: 5px; line-height: 1.5; }
.legend-row {
  display: flex; align-items: center;
  gap: 6px; font-size: 10px; color: #666; margin-bottom: 3px;
}
.sim-input {
  width: 60px;
  padding: 4px 6px;
  background: #111;
  border: 1px solid #334;
  color: #ddd;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  border-radius: 3px;
}
</style>
</head>
<body>
<h1>🏰 DUNGEON PROTOTYPE — 2D</h1>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="sidebar">

    <div class="panel">
      <div id="time-display" onclick="handleTimeClick()">▶ START</div>
    </div>

    <div class="panel">
      <div class="panel-title">⚔️ 自動スポーン</div>
      <div class="hint">▶ 次にスポーンされる種族</div>
      <button class="spawn-btn active" id="btn-human" onclick="selectType('human')">🗡 人間   HP:30 ATK:5</button>
      <button class="spawn-btn"        id="btn-elf"   onclick="selectType('elf')"  >🏹 エルフ HP:20 ATK:6</button>
      <button class="spawn-btn"        id="btn-dwarf" onclick="selectType('dwarf')">⛏ ドワーフHP:35 ATK:6</button>
    </div>

    <div class="panel">
      <div class="panel-title">📊 勢力情報</div>
      <div id="faction-display"></div>
    </div>

    <div class="panel">
      <div class="panel-title">🗺️ 凡例</div>
      <div class="legend-row"><span style="color:#4488ff">●</span> 人間族クリスタル（自動スポーン）</div>
      <div class="legend-row"><span style="color:#44cc44">●</span> ゴブリン族クリスタル</div>
      <div class="legend-row"><span style="color:#ff8844">●</span> リザード族クリスタル</div>
      <div class="legend-row"><span style="color:#cc44cc">●</span> オーガ族クリスタル</div>
      <div class="legend-row"><span style="color:#666">●</span> 中立クリスタル</div>
      <div class="legend-row">🔴 戦闘中のマス</div>
    </div>

    <div class="panel">
      <button class="spawn-btn" onclick="downloadAndClearLog()" style="text-align:center;color:#8bf;">📥 ログをDL &amp; クリア</button>
      <button class="spawn-btn" onclick="restartGame()" style="text-align:center;color:#f88;margin-top:4px;">🔄 リスタート</button>
    </div>

    <div class="panel" id="sim-panel">
      <div class="panel-title">🤖 一括シミュレーション</div>
      <div style="display:flex;gap:4px;margin-bottom:4px;align-items:center;">
        <input id="sim-count" type="number" value="10" min="1" max="1000" class="sim-input">
        <span style="font-size:11px;color:#888">回</span>
      </div>
      <button class="spawn-btn" onclick="runBulkSimulation()" style="text-align:center;color:#af8;">▶▶ 実行 &amp; ログDL</button>
      <div id="sim-progress" style="font-size:10px;color:#666;margin-top:4px;"></div>
    </div>

  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONSTANTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GRID         = 51;
const CELL         = 14;
const CANVAS_SIZE  = GRID * CELL;   // 714px (1.2x)

const PATH_REFRESH   = 3.0;  // seconds between path recalculation
const LOOP_COUNT     = 200;  // extra passages added to maze
const SPD_COMMON     = 1.0;  // 全種族共通移動速度（マス/秒）

// AI種族別スポーン間隔（秒）
const AI_SPAWN = { goblin: 11, lizard: 13, ogre: 18 };

// 人間側クリスタル1つあたりのスポーンクールダウン（秒）
const HUMAN_SPAWN_COOLDOWN = 10;

// 勢力ユニット上限 = 所有クリスタル数 × この係数
const UNIT_CAP_PER_CRYSTAL = 5;

const FACTIONS = {
  human:   { name: '人間族',    color: '#4488ff', zone: [0, 12, 0,  12] },
  goblin:  { name: 'ゴブリン',  color: '#44cc44', zone: [0, 12, 38, 50] },
  lizard:  { name: 'リザード',  color: '#ff8844', zone: [38, 50, 0, 12] },
  ogre:    { name: 'オーガ',    color: '#cc44cc', zone: [38, 50, 38, 50] },
  neutral: { name: '中立',      color: '#666666', zone: null },
};

const UNIT_DEFS = {
  human:  { emoji: '🗡', hp: 33, atk: 5,  spd: SPD_COMMON, faction: 'human'  },
  elf:    { emoji: '🏹', hp: 28, atk: 6,  spd: SPD_COMMON, faction: 'human'  },
  dwarf:  { emoji: '⛏',  hp: 38, atk: 4,  spd: SPD_COMMON, faction: 'human'  },
  goblin: { emoji: '👽', hp: 28, atk: 6,  spd: SPD_COMMON, faction: 'goblin' },
  lizard: { emoji: '🦖', hp: 28, atk: 7,  spd: SPD_COMMON, faction: 'lizard' },
  ogre:   { emoji: '👹', hp: 52, atk: 6,  spd: SPD_COMMON, faction: 'ogre'   },
};

const AI_UNIT = { goblin: 'goblin', lizard: 'lizard', ogre: 'ogre' };

// 不利な組み合わせのみ記載（ATK × 0.7）。記載のないペアはすべて × 1.0
// 出典: GAME_DESIGN.md「6種族の相性システム」
const AFFINITY_DEBUFF = new Set([
  'human-goblin',   // 三すくみ：ゴブリン > ヒューマン
  'elf-lizard',     // 鱗が矢を弾く
  'dwarf-ogre',     // 怪力が鎧ごと吹き飛ばす
  'goblin-ogre',    // 三すくみ：オーガ > ゴブリン
  'lizard-goblin',  // 三すくみ：ゴブリン > リザード
  'ogre-lizard',    // 三すくみ：リザード > オーガ
]);

function getAffinityMult(attackerType, defenderType) {
  return AFFINITY_DEBUFF.has(`${attackerType}-${defenderType}`) ? 0.7 : 1.0;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let grid         = [];
let crystals     = [];
let units        = [];
let selectedType = 'human';
let gameTime     = 0;
let lastTime     = 0;
let mazeImg      = null;
let rafId        = null;
let gameStarted  = false;
let isSimulating = false;
let gameLog             = null;
let humanAutoSpawnIndex = 0;  // 0=human 1=elf 2=dwarf のローテーション

const LOG_STORAGE_KEY   = 'dungeon_prototype_log';
const HUMAN_AUTO_TYPES  = ['human', 'elf', 'dwarf'];

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MAZE GENERATION (iterative DFS)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function generateMaze(size) {
  const g = Array.from({ length: size }, () => new Uint8Array(size).fill(1));
  g[1][1] = 0;
  const stack = [[1, 1]];

  while (stack.length) {
    const [r, c] = stack[stack.length - 1];
    const dirs = [[-2,0],[2,0],[0,-2],[0,2]];
    for (let i = 3; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
    }
    let moved = false;
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr > 0 && nr < size - 1 && nc > 0 && nc < size - 1 && g[nr][nc] === 1) {
        g[r + dr / 2][c + dc / 2] = 0;
        g[nr][nc] = 0;
        stack.push([nr, nc]);
        moved = true;
        break;
      }
    }
    if (!moved) stack.pop();
  }

  // Add loops for non-linear paths
  let added = 0;
  for (let attempt = 0; added < LOOP_COUNT && attempt < 2000; attempt++) {
    const r = 1 + Math.floor(Math.random() * (size - 2));
    const c = 1 + Math.floor(Math.random() * (size - 2));
    if (g[r][c] !== 1) continue;
    const vert  = r > 0 && r < size - 1 && g[r-1][c] === 0 && g[r+1][c] === 0;
    const horiz = c > 0 && c < size - 1 && g[r][c-1] === 0 && g[r][c+1] === 0;
    if (vert || horiz) { g[r][c] = 0; added++; }
  }

  // Reduce dead ends: detect cells with only 1 open neighbor and break one adjacent wall (3 passes)
  const DIRS4 = [[-1,0],[1,0],[0,-1],[0,1]];
  for (let pass = 0; pass < 3; pass++) {
    for (let r = 1; r < size - 1; r++) {
      for (let c = 1; c < size - 1; c++) {
        if (g[r][c] !== 0) continue;
        const openDirs = DIRS4.filter(([dr,dc]) => g[r+dr][c+dc] === 0);
        if (openDirs.length !== 1) continue; // dead end = 通路が1方向のみ
        // 壁方向のうち境界内のものをランダムに1つ開ける
        const wallDirs = DIRS4.filter(([dr,dc]) => {
          const nr = r+dr, nc = c+dc;
          return nr > 0 && nr < size-1 && nc > 0 && nc < size-1 && g[nr][nc] === 1;
        });
        if (wallDirs.length === 0) continue;
        const [dr,dc] = wallDirs[Math.floor(Math.random() * wallDirs.length)];
        g[r+dr][c+dc] = 0;
      }
    }
  }

  return g;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BFS PATHFINDING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function bfs(sr, sc, gr, gc) {
  if (!grid[gr] || grid[gr][gc] !== 0) return null;
  if (sr === gr && sc === gc) return [[sr, sc]];

  const key = (r, c) => r * GRID + c;
  const prev = new Map([[key(sr, sc), -1]]);
  const q = [[sr, sc]];

  outer:
  for (let i = 0; i < q.length; i++) {
    const [r, c] = q[i];
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID || grid[nr][nc] !== 0) continue;
      const k = key(nr, nc);
      if (prev.has(k)) continue;
      prev.set(k, key(r, c));
      if (nr === gr && nc === gc) break outer;
      q.push([nr, nc]);
    }
  }

  const gk = key(gr, gc);
  if (!prev.has(gk)) return null;

  const path = [];
  let k = gk;
  while (k !== -1) {
    path.unshift([Math.floor(k / GRID), k % GRID]);
    k = prev.get(k);
  }
  return path;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CRYSTALS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openCells(r1, r2, c1, c2) {
  const out = [];
  for (let r = r1; r <= r2; r++)
    for (let c = c1; c <= c2; c++)
      if (grid[r]?.[c] === 0) out.push([r, c]);
  return out;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initCrystals() {
  crystals = [];
  const E = GRID - 2;  // 49
  const Z = 11;        // corner zone size

  // 配置済みセルの重複防止
  const usedCells = new Set();
  function pickCells(r1, r2, c1, c2, n) {
    const candidates = shuffle(openCells(r1, r2, c1, c2))
      .filter(([r, c]) => !usedCells.has(`${r},${c}`));
    const picked = candidates.slice(0, n);
    picked.forEach(([r, c]) => usedCells.add(`${r},${c}`));
    return picked;
  }

  // 3 pre-claimed crystals per faction corner
  const cornerZones = [
    { owner: 'human',  r1: 1,   r2: Z,   c1: 1,   c2: Z   },
    { owner: 'goblin', r1: 1,   r2: Z,   c1: E-Z, c2: E   },
    { owner: 'lizard', r1: E-Z, r2: E,   c1: 1,   c2: Z   },
    { owner: 'ogre',   r1: E-Z, r2: E,   c1: E-Z, c2: E   },
  ];

  for (const z of cornerZones) {
    const cells = pickCells(z.r1, z.r2, z.c1, z.c2, 3);
    const interval = z.owner === 'human' ? HUMAN_SPAWN_COOLDOWN : AI_SPAWN[z.owner];
    for (const [r, c] of cells) {
      crystals.push({
        r, c,
        owner: z.owner,
        spawnTimer:    Math.random() * interval,  // 全種族共通：0〜CDのランダム待機
        lastSpawnTime: -HUMAN_SPAWN_COOLDOWN,     // クリック操作用（人間のみ使用）
      });
    }
  }

  // 各拠点近傍に2個ずつ中立クリスタルを配置（初動格差の抑制）
  const nearFactionZones = [
    { r1: 1,      r2: Z+6,  c1: Z+1,   c2: Z+6  }, // 人間拠点近傍
    { r1: 1,      r2: Z+6,  c1: E-Z-6, c2: E-1  }, // ゴブリン拠点近傍
    { r1: E-Z-6,  r2: E-1,  c1: Z+1,   c2: Z+6  }, // リザード拠点近傍
    { r1: E-Z-6,  r2: E-1,  c1: E-Z-6, c2: E-1  }, // オーガ拠点近傍
  ];
  for (const z of nearFactionZones) {
    const cells = pickCells(z.r1, z.r2, z.c1, z.c2, 2);
    for (const [r, c] of cells) {
      crystals.push({ r, c, owner: 'neutral', spawnTimer: 0, lastSpawnTime: -HUMAN_SPAWN_COOLDOWN });
    }
  }

  // 中央に8個の中立クリスタル
  const midCells = pickCells(Z + 2, E - Z - 2, Z + 2, E - Z - 2, 8);
  for (const [r, c] of midCells) {
    crystals.push({ r, c, owner: 'neutral', spawnTimer: 0, lastSpawnTime: -HUMAN_SPAWN_COOLDOWN });
  }
}

function updateCrystals(dt) {
  for (const cr of crystals) {
    if (cr.owner === 'neutral') continue;
    cr.spawnTimer += dt;
    const spawnInterval = cr.owner === 'human' ? HUMAN_SPAWN_COOLDOWN : AI_SPAWN[cr.owner];
    if (cr.spawnTimer >= spawnInterval) {
      cr.spawnTimer -= spawnInterval;
      trySpawnFromCrystal(cr);
    }
  }
}

function trySpawnFromCrystal(cr) {
  // ユニット種の決定（人間族は3種ローテーション、他種族は固定）
  let type;
  if (cr.owner === 'human') {
    type = HUMAN_AUTO_TYPES[humanAutoSpawnIndex % HUMAN_AUTO_TYPES.length];
  } else {
    type = AI_UNIT[cr.owner];
  }
  if (!type) return;

  // 勢力ユニット上限チェック（クリスタル1つごとに判定・全種族共通）
  const cap     = crystals.filter(c => c.owner === cr.owner).length * UNIT_CAP_PER_CRYSTAL;
  const current = units.filter(u => u.faction === cr.owner).length;
  if (current >= cap) return;

  units.push(makeUnit(type, cr.r, cr.c));
  recordSpawn(type);

  if (cr.owner === 'human') {
    humanAutoSpawnIndex++;
    updateSpawnIndicator();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UNITS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function makeUnit(type, r, c) {
  const d = UNIT_DEFS[type];
  const faction = d.faction;
  // 全勢力共通：スポーン時にランダムなターゲットを割り当て
  const candidates = crystals.filter(cr => cr.owner !== faction);
  const targetCrystal = candidates.length > 0
    ? candidates[Math.floor(Math.random() * candidates.length)]
    : null;
  return {
    type, r, c,
    emoji:         d.emoji,
    faction,
    hp:            d.hp,
    maxHp:         d.hp,
    atk:           d.atk,
    spd:           d.spd,
    path:          null,
    pathTimer:     Math.random() * 2,  // stagger initial BFS calls
    moveTimer:     0,
    inCombat:      false,
    targetCrystal, // 現在の目標クリスタル（全勢力共通）
    retreating:    false,  // 回復のため自軍クリスタルへ退却中
    healing:       false,  // クリスタルで回復待機中
    retreatTarget: null,   // 退却先クリスタル
    spawnTime:     gameTime,
    lastAttacker:  null,
  };
}

function nearestFriendlyCrystal(unit) {
  let best = null, bestDist = Infinity;
  for (const cr of crystals) {
    if (cr.owner !== unit.faction) continue;
    const d = Math.abs(cr.r - unit.r) + Math.abs(cr.c - unit.c);
    if (d < bestDist) { bestDist = d; best = cr; }
  }
  return best;
}

function bestTarget(unit) {
  let best = null, bestDist = Infinity;
  for (const cr of crystals) {
    if (cr.owner === unit.faction) continue;
    const d = Math.abs(cr.r - unit.r) + Math.abs(cr.c - unit.c);
    if (d < bestDist) { bestDist = d; best = cr; }
  }
  return best;
}

// 自勢力以外のクリスタルを距離反比例の重みでランダムに1つ返す（近いほど選ばれやすい）
function randomTarget(unit) {
  const candidates = crystals.filter(cr => cr.owner !== unit.faction);
  if (candidates.length === 0) return null;
  const weights = candidates.map(cr => {
    const d = Math.abs(cr.r - unit.r) + Math.abs(cr.c - unit.c);
    return 1 / (d + 1);
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let rand = Math.random() * total;
  for (let i = 0; i < candidates.length; i++) {
    rand -= weights[i];
    if (rand <= 0) return candidates[i];
  }
  return candidates[candidates.length - 1];
}

// 再評価タイマーの初期値（10〜20秒のランダム）
function newRetargetInterval() {
  return 10 + Math.random() * 10;
}

function updateUnits(dt) {
  // Build cell→units lookup for fast combat checks
  const cellMap = new Map();
  for (const u of units) {
    const k = u.r * GRID + u.c;
    if (!cellMap.has(k)) cellMap.set(k, []);
    cellMap.get(k).push(u);
  }

  for (const u of units) {
    if (u.hp <= 0) continue;

    // ── Combat: attack enemies on same cell ──
    const cellGroup = cellMap.get(u.r * GRID + u.c) || [];
    const enemies = cellGroup.filter(e => e.faction !== u.faction && e.hp > 0);
    if (enemies.length > 0) {
      u.inCombat = true;
      u.healing = false; // 戦闘で回復を中断
      const target = enemies[Math.floor(Math.random() * enemies.length)];
      target.hp -= u.atk * getAffinityMult(u.type, target.type) * dt;
      target.lastAttacker = u.type;
      continue;
    }
    u.inCombat = false;

    // ── Healing at friendly crystal ──
    if (u.healing) {
      if (!u.retreatTarget || u.retreatTarget.owner !== u.faction) {
        // 回復先が奪われた → 次の自軍クリスタルへ
        const next = nearestFriendlyCrystal(u);
        if (next) {
          u.retreatTarget = next;
          u.retreating = true;
          u.healing = false;
          u.path = null;
          u.pathTimer = 0;
        } else {
          // 自軍クリスタルなし → 通常行動に戻る
          u.healing = false;
          u.retreatTarget = null;
        }
      } else {
        // MaxHP / 8 per second で回復
        u.hp = Math.min(u.maxHp, u.hp + (u.maxHp / 8) * dt);
        if (u.hp >= u.maxHp) {
          u.healing = false;
          u.retreatTarget = null;
          u.path = null;
          u.pathTimer = 0;
          if (gameLog) gameLog.unitStats[u.type].healedSuccessfully++;
        }
      }
      continue; // 回復中は移動しない
    }

    // ── Retreat detection: HP が 1/3 以下なら最寄り自軍クリスタルへ退却 ──
    if (!u.retreating && u.hp <= u.maxHp / 3) {
      const cr = nearestFriendlyCrystal(u);
      if (cr) {
        u.retreatTarget = cr;
        u.retreating = true;
        u.path = null;
        u.pathTimer = 0;
        if (gameLog) gameLog.unitStats[u.type].retreats++;
      }
    }

    // ── Retreat: 到着確認 / 退却先消失チェック ──
    if (u.retreating) {
      if (!u.retreatTarget || u.retreatTarget.owner !== u.faction) {
        // 退却先が奪われた → 次の自軍クリスタルへ切り替え
        const next = nearestFriendlyCrystal(u);
        if (next) {
          u.retreatTarget = next;
          u.path = null;
          u.pathTimer = 0;
        } else {
          // 自軍クリスタルなし → 通常行動（敵クリスタルを目標）
          u.retreating = false;
          u.retreatTarget = null;
        }
      } else if (u.r === u.retreatTarget.r && u.c === u.retreatTarget.c) {
        // 到着 → 回復開始
        u.retreating = false;
        u.healing = true;
        u.path = null;
      }
    }

    // ── Crystal claim (退却・回復中はスキップ) ──
    if (!u.retreating && !u.healing) {
      const cr = crystals.find(x => x.r === u.r && x.c === u.c && x.owner !== u.faction);
      if (cr) {
        cr.owner = u.faction;
        cr.spawnTimer = 0;
        u.path = null;
        u.pathTimer = 0;
        u.targetCrystal = randomTarget(u);
      }
    }

    // ── ターゲット検証（目標が自陣になったら再ターゲット・全勢力共通） ──
    if (!u.retreating && u.targetCrystal && u.targetCrystal.owner === u.faction) {
      u.targetCrystal = randomTarget(u);
      u.path = null;
      u.pathTimer = 0;
    }

    // ── Pathfinding refresh ──
    u.pathTimer -= dt;
    if (u.pathTimer <= 0) {
      u.pathTimer = PATH_REFRESH;
      const navTarget = u.retreating
        ? u.retreatTarget
        : (u.targetCrystal ? u.targetCrystal : bestTarget(u));
      u.path = navTarget ? bfs(u.r, u.c, navTarget.r, navTarget.c) : null;
    }

    // ── Movement ──
    u.moveTimer -= dt;
    if (u.moveTimer <= 0) {
      u.moveTimer = 1 / u.spd;
      if (u.path && u.path.length > 1) {
        u.path.shift();
        u.r = u.path[0][0];
        u.c = u.path[0][1];
      } else {
        u.path = null;
        u.pathTimer = 0;
      }
    }
  }

  // Record deaths then remove dead units
  for (const u of units) { if (u.hp <= 0) recordDeath(u); }
  units = units.filter(u => u.hp > 0);
}

function updateSpawnIndicator() {
  if (isSimulating) return;
  const next = HUMAN_AUTO_TYPES[humanAutoSpawnIndex % HUMAN_AUTO_TYPES.length];
  document.querySelectorAll('.spawn-btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + next)?.classList.add('active');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PLAYER INPUT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.spawn-btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type)?.classList.add('active');
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top)  * scaleY;
  const cc = Math.floor(px / CELL);
  const cr = Math.floor(py / CELL);

  const crystal = crystals.find(x => x.r === cr && x.c === cc && x.owner === 'human');
  if (!crystal) return;

  // クールダウンチェック（クリスタル1つにつき5秒に1体）
  if (gameTime - crystal.lastSpawnTime < HUMAN_SPAWN_COOLDOWN) return;
  crystal.lastSpawnTime = gameTime;

  units.push(makeUnit(selectedType, cr, cc));
  recordSpawn(selectedType);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDERING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildMazeImage() {
  const oc = document.createElement('canvas');
  oc.width = CANVAS_SIZE;
  oc.height = CANVAS_SIZE;
  const mc = oc.getContext('2d');

  // Faction zone tint (subtle background color per corner)
  for (const [, fdata] of Object.entries(FACTIONS)) {
    if (!fdata.zone) continue;
    const [r1, r2, c1, c2] = fdata.zone;
    mc.fillStyle = fdata.color + '14';
    mc.fillRect(c1 * CELL, r1 * CELL, (c2 - c1 + 1) * CELL, (r2 - r1 + 1) * CELL);
  }

  // Draw cells
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      mc.fillStyle = grid[r][c] === 1 ? '#141414' : '#303040';
      mc.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  mazeImg = oc;
}

function render() {
  ctx.drawImage(mazeImg, 0, 0);

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // ── Draw crystals ──
  for (const cr of crystals) {
    const x = cr.c * CELL + CELL / 2;
    const y = cr.r * CELL + CELL / 2;
    const color = FACTIONS[cr.owner].color;

    ctx.beginPath();
    ctx.arc(x, y, CELL / 2 - 0.5, 0, Math.PI * 2);
    ctx.fillStyle   = cr.owner === 'neutral' ? '#252530' : color + '33';
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    ctx.font      = '10px sans-serif';
    ctx.fillStyle = cr.owner === 'neutral' ? '#555' : '#ddd';
    ctx.fillText('💎', x, y);

    // 人間クリスタルのスポーンクールダウン表示（spawnTimerベース・全種族共通の仕組みを反映）
    if (cr.owner === 'human' && gameStarted) {
      const ratio = cr.spawnTimer / HUMAN_SPAWN_COOLDOWN;
      if (ratio < 1) {
        ctx.beginPath();
        ctx.arc(x, y, CELL / 2 - 0.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.arc(x, y, CELL / 2 - 0.5, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ratio);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();
      }
    }
  }

  // ── Draw units (grouped per cell) ──
  const cellMap = new Map();
  for (const u of units) {
    const k = u.r * GRID + u.c;
    if (!cellMap.has(k)) cellMap.set(k, []);
    cellMap.get(k).push(u);
  }

  for (const [k, group] of cellMap) {
    const r = Math.floor(k / GRID);
    const c = k % GRID;
    const x = c * CELL + CELL / 2;
    const y = r * CELL + CELL / 2;

    // Combat flash
    const hasCombat = group.some(u => u.inCombat);
    if (hasCombat) {
      ctx.fillStyle = 'rgba(255, 60, 0, 0.45)';
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }

    const u0 = group[0];

    // HP bar (2px high, top of cell)
    const hp = u0.hp / u0.maxHp;
    ctx.fillStyle = '#111';
    ctx.fillRect(c * CELL, r * CELL, CELL, 2);
    ctx.fillStyle = hp > 0.5 ? '#4f4' : hp > 0.25 ? '#ff4' : '#f44';
    ctx.fillRect(c * CELL, r * CELL, CELL * hp, 2);

    // Emoji
    ctx.font = '11px sans-serif';
    ctx.fillText(u0.emoji, x, y + 1);

    // Count badge when multiple units
    if (group.length > 1) {
      ctx.font      = 'bold 9px monospace';
      ctx.fillStyle = '#fff';
      ctx.fillText(group.length, x + 4, y + 4);
    }
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SIDEBAR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateSidebar() {
  const el = document.getElementById('time-display');
  if (gameStarted) {
    const mm = String(Math.floor(gameTime / 60)).padStart(2, '0');
    const ss = String(Math.floor(gameTime % 60)).padStart(2, '0');
    el.textContent = `⏱ ${mm}:${ss}`;
  } else {
    el.textContent = '▶ START';
  }

  const crystalCount = {}, unitCount = {};
  for (const f of ['human','goblin','lizard','ogre']) {
    crystalCount[f] = 0; unitCount[f] = 0;
  }
  for (const cr of crystals) if (cr.owner in crystalCount) crystalCount[cr.owner]++;
  for (const u  of units)    if (u.faction in unitCount)   unitCount[u.faction]++;

  const html = ['human','goblin','lizard','ogre'].map(f => {
    const d = FACTIONS[f];
    return `<div class="faction-row">
      <span><span class="dot" style="background:${d.color}"></span>${d.name}</span>
      <span style="color:${d.color}">💎${crystalCount[f]}　⚔️${unitCount[f]}</span>
    </div>`;
  }).join('');
  document.getElementById('faction-display').innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOG SYSTEM
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initGameLog() {
  gameLog = {
    sessionId:      new Date().toISOString(),
    duration:       0,
    unitStats:      {},  // type → { spawned, killed, killsMade, totalLifetime, retreats, healedSuccessfully, killedWhileRetreating }
    matchups:       {},  // 'attacker_kills_defender' → N
    timeline:       [],  // 30秒ごとのスナップショット
    spawnByFaction: {},  // faction → 総スポーン数
    nextSnapshotAt: 30,
  };
  for (const type of Object.keys(UNIT_DEFS)) {
    gameLog.unitStats[type] = {
      spawned: 0, killed: 0, killsMade: 0, totalLifetime: 0,
      retreats: 0, healedSuccessfully: 0, killedWhileRetreating: 0,
    };
  }
  for (const f of ['human','goblin','lizard','ogre']) {
    gameLog.spawnByFaction[f] = 0;
  }
}

function recordSpawn(type) {
  if (!gameLog) return;
  gameLog.unitStats[type].spawned++;
  const faction = UNIT_DEFS[type].faction;
  gameLog.spawnByFaction[faction] = (gameLog.spawnByFaction[faction] || 0) + 1;
}

function recordDeath(unit) {
  if (!gameLog) return;
  const s = gameLog.unitStats[unit.type];
  if (!s) return;
  s.killed++;
  s.totalLifetime += gameTime - (unit.spawnTime ?? gameTime);
  if (unit.retreating || unit.healing) s.killedWhileRetreating++;
  if (unit.lastAttacker) {
    gameLog.unitStats[unit.lastAttacker].killsMade++;
    const key = `${unit.lastAttacker}_kills_${unit.type}`;
    gameLog.matchups[key] = (gameLog.matchups[key] || 0) + 1;
  }
}

function takeSnapshot() {
  if (!gameLog) return;
  const cc = { human: 0, goblin: 0, lizard: 0, ogre: 0, neutral: 0 };
  const uc = { human: 0, goblin: 0, lizard: 0, ogre: 0 };
  for (const cr of crystals) if (cr.owner in cc) cc[cr.owner]++;
  for (const u  of units)    if (u.faction in uc) uc[u.faction]++;
  gameLog.timeline.push({ t: Math.round(gameTime), crystals: { ...cc }, units: { ...uc } });
  gameLog.duration = gameTime;
  // 30秒ごとに localStorage に保存（ページクラッシュ対策）
  saveLogToStorage();
}

function saveLogToStorage() {
  if (!gameLog) return;
  if (isSimulating) return;
  gameLog.duration = gameTime;
  // avgLifetime を計算してから保存
  const out = JSON.parse(JSON.stringify(gameLog));
  for (const [type, s] of Object.entries(out.unitStats)) {
    s.avgLifetime = s.killed > 0 ? Math.round(s.totalLifetime / s.killed * 10) / 10 : null;
  }
  localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(out, null, 2));
}

function downloadAndClearLog() {
  saveLogToStorage();
  const data = localStorage.getItem(LOG_STORAGE_KEY);
  if (!data) { alert('ログがありません。ゲームを開始してください。'); return; }
  const ts   = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
  const blob = new Blob([data], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `dungeon_log_${ts}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  clearLogCache();
}

function clearLogCache() {
  localStorage.removeItem(LOG_STORAGE_KEY);
  gameLog = null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// START CONTROL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handleTimeClick() {
  if (!gameStarted) {
    gameStarted = true;
    initGameLog();
    requestAnimationFrame(ts => {
      lastTime = ts;
      rafId = requestAnimationFrame(loop);
    });
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAME LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  gameTime += dt;

  // 30秒ごとにスナップショット取得
  if (gameLog && gameTime >= gameLog.nextSnapshotAt) {
    takeSnapshot();
    gameLog.nextSnapshotAt += 30;
  }

  updateUnits(dt);
  updateCrystals(dt);
  render();
  updateSidebar();

  rafId = requestAnimationFrame(loop);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HEADLESS SIMULATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getWinner() {
  const factions = ['human', 'goblin', 'lizard', 'ogre'];
  const active = factions.filter(f => crystals.some(cr => cr.owner === f));
  return active.length === 1 ? active[0] : null;
}

function simulateOneGame(maxTime = 600) {
  grid = generateMaze(GRID);
  units = [];
  gameTime = 0;
  humanAutoSpawnIndex = 0;
  initCrystals();
  initGameLog();

  const dt = 1 / 60;
  while (gameTime < maxTime) {
    gameTime += dt;
    if (gameLog && gameTime >= gameLog.nextSnapshotAt) {
      takeSnapshot();
      gameLog.nextSnapshotAt += 30;
    }
    updateUnits(dt);
    updateCrystals(dt);
    if (getWinner()) break;
  }

  gameLog.duration = gameTime;
  const out = JSON.parse(JSON.stringify(gameLog));
  for (const [, s] of Object.entries(out.unitStats)) {
    s.avgLifetime = s.killed > 0 ? Math.round(s.totalLifetime / s.killed * 10) / 10 : null;
  }
  out.winner = getWinner() || 'none';
  return out;
}

async function runBulkSimulation() {
  const n = Math.max(1, parseInt(document.getElementById('sim-count').value) || 10);
  const progress = document.getElementById('sim-progress');

  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  isSimulating = true;
  gameStarted = false;

  const results = [];
  for (let i = 0; i < n; i++) {
    results.push(simulateOneGame(600));
    progress.textContent = `実行中... ${i + 1}/${n}`;
    await new Promise(r => setTimeout(r, 0));
  }

  isSimulating = false;

  // Restore visual game state
  grid = generateMaze(GRID);
  units = [];
  gameTime = 0;
  humanAutoSpawnIndex = 0;
  gameLog = null;
  gameStarted = false;
  initCrystals();
  buildMazeImage();
  render();
  updateSidebar();

  // Download combined JSON
  const ts = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
  const blob = new Blob([JSON.stringify(results, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dungeon_sim_${n}games_${ts}.json`;
  a.click();
  URL.revokeObjectURL(a.href);

  // Show win summary
  const wins = {};
  for (const r of results) wins[r.winner] = (wins[r.winner] || 0) + 1;
  progress.textContent = '完了！ ' + Object.entries(wins)
    .sort((a, b) => b[1] - a[1])
    .map(([f, w]) => `${f}:${w}`)
    .join('  ');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT / RESTART
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function restartGame() {
  if (rafId) cancelAnimationFrame(rafId);
  clearLogCache();
  selectedType        = 'human';
  gameTime            = 0;
  gameStarted         = false;
  rafId               = null;
  humanAutoSpawnIndex = 0;
  document.querySelectorAll('.spawn-btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-human')?.classList.add('active');

  grid     = generateMaze(GRID);
  units    = [];
  initCrystals();
  buildMazeImage();
  render();
  updateSidebar();
}

restartGame();
</script>
