<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Dungeon - Ray Casting FPS</title>
<link rel="stylesheet" href="css/style.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #game-wrapper {
    position: relative;
    display: inline-block;
  }
  canvas { display: block; }

</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="c"></canvas>

  <!-- Battle Panel（3Dビュー領域 740×500px に重ねる） -->
  <div id="battle-panel" hidden>
    <div id="battle-header">
      <span class="battle-title">⚔ 戦闘 — <span id="battle-enemy-name"></span></span>
      <span id="battle-counts" class="battle-counts"></span>
    </div>
    <div id="battle-main">
      <div class="battle-side">
        <div class="battle-side-label">敵部隊</div>
        <div id="battle-enemy-list"></div>
      </div>
      <div class="battle-side">
        <div class="battle-side-label">味方部隊</div>
        <div id="battle-ally-list"></div>
      </div>
    </div>
    <div id="battle-action-info">
      <div class="ai-field"><span class="ai-label">対象</span><span id="battle-info-target" class="ai-value">—</span></div>
      <div class="ai-field"><span class="ai-label">コマンド</span><span id="battle-info-cmd" class="ai-value">戦う</span></div>
      <div class="ai-field"><span class="ai-label">予測ダメージ</span><span id="battle-info-dmg" class="ai-value ai-dmg">—</span></div>
      <div class="ai-field"><span class="ai-label">相性</span><span id="battle-info-affin" class="ai-value">—</span></div>
    </div>
    <div id="battle-actions">
      <button class="battle-btn" id="btn-fight">⚔ 戦う</button>
      <button class="battle-btn" id="btn-flee">🏃 逃げる</button>
    </div>
    <div id="battle-hint">←→ コマンド切替　/　↑↓ 対象選択　/　Enter 決定</div>
    <div id="battle-log"></div>
  </div>

  <!-- Shop Modal -->
  <div id="shop-modal" hidden>
    <div class="shop-modal-inner">
      <div class="shop-modal-title">
        🛒 ショップ &nbsp;
        <span style="color:#ffaa44;font-weight:normal">所持GOLD: <span id="shop-gold">0</span></span>
      </div>
      <div class="shop-modal-note">※ 既存装備は半値で自動買取。購入で1ターン消費。</div>
      <div id="shop-items"></div>
      <button class="shop-close-btn" onclick="closeShop()">閉じる（ターン消費なし）[Esc]</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" hidden>
    <div class="result-inner">
      <div class="result-title" id="result-title"></div>
      <div class="result-detail" id="result-detail"></div>
      <button class="result-restart-btn" onclick="showRestartConfirm()">🔄 もう一度プレイ [R]</button>
    </div>
  </div>

  <!-- 全体マップ専用キャンバス（最前面 z-index:50） -->
  <canvas id="fullmap-c" hidden></canvas>

  <!-- リセット確認ダイアログ（z-index:60） -->
  <div id="restart-confirm" hidden>
    <div class="restart-confirm-inner">
      <div class="restart-confirm-title">ゲームをリセットしますか？</div>
      <div class="restart-confirm-hint">現在のゲームの進行は失われます</div>
      <div class="restart-confirm-btns">
        <button class="restart-confirm-btn yes" onclick="confirmRestart()">はい [Y]</button>
        <button class="restart-confirm-btn no"  onclick="cancelRestartConfirm()">いいえ [N]</button>
      </div>
    </div>
  </div>

</div>
<script src="js/config.js"></script>
<script src="js/sprites.js"></script>
<script src="js/maze.js"></script>
<script src="js/player.js"></script>
<script src="js/monsters.js"></script>
<script src="js/crystals.js"></script>
<script src="js/render3d.js"></script>
<script src="js/minimap.js"></script>
<script src="js/battle.js"></script>
<script src="js/shop.js"></script>
<script src="js/ui.js"></script>
<script src="js/input.js"></script>
<script src="js/main.js"></script>
</body>
</html>
